<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DHANZX DASHBOARD</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b10;
    color: white;
}

/* TOP BAR */
.topbar {
    padding: 20px;
    font-size: 20px;
    font-weight: bold;
    background: linear-gradient(90deg, #ff00cc, #6600ff);
    text-align: center;
}

/* CONTAINER */
.container {
    padding: 15px;
    display: grid;
    gap: 15px;
}

/* CARD */
.card {
    background: #141420;
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 0 15px rgba(255,0,255,0.2);
}

/* TITLE */
.card h3 {
    margin: 0 0 10px;
    color: #ff66ff;
}

/* INPUT */
.input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    margin-bottom: 10px;
    background: #0b0b10;
    color: white;
}

/* SELECT */
select {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin-bottom: 10px;
    background: #0b0b10;
    color: #ff66ff;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg, #ff00cc, #6600ff);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* POPUP */
.popup {
    position: fixed;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(10px);
    background: rgba(0,0,0,0.6);
}

.popup-box {
    width: 280px;
    padding: 20px;
    border-radius: 15px;
    background: #1a1a25;
    text-align: center;
    border: 1px solid #ff00cc;
    box-shadow: 0 0 20px rgba(255,0,204,0.4);
}

.spinner {
    width: 35px;
    height: 35px;
    margin: 10px auto;
    border: 3px solid rgba(255,255,255,0.2);
    border-top: 3px solid #ff00cc;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.glitch {
    animation: glitch 0.2s infinite;
}

@keyframes glitch {
    0% { transform: translate(0); }
    25% { transform: translate(1px,-1px); }
    50% { transform: translate(-1px,1px); }
    75% { transform: translate(1px,1px); }
    100% { transform: translate(0); }
}
</style>
</head>

<body>

<div class="topbar">DHANZX DASHBOARD ⚡</div>

<div class="container">

    <!-- CRASH -->
    <div class="card">
        <h3>MODE CRASH</h3>
        <input class="input" type="tel" placeholder="+62 nomor target">

        <select>
            <option>Crash Biasa</option>
            <option>Crash Lag</option>
            <option>Crash Lag Parah</option>
        </select>

        <button onclick="showPopup()">KIRIM CRASH</button>
    </div>

    <!-- BLOKIR -->
    <div class="card">
        <h3>MODE BLOKIR</h3>
        <input class="input" type="tel" placeholder="+62 nomor target">

        <select>
            <option>Blokir 1 Hari</option>
            <option>Blokir 1 Minggu</option>
            <option>Blokir 1 Bulan</option>
            <option>Blokir Permanen</option>
        </select>

        <button onclick="showPopup()">KIRIM BLOKIR</button>
    </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="popup-box" id="box">

        <div id="title">⚠️ PROSES DIMUAT</div>

        <div class="spinner" id="spinner"></div>

        <div id="text">Sedang memproses...</div>

        <button id="btn" onclick="closePopup()" style="display:none;margin-top:10px;">Tutup</button>

    </div>
</div>

<script>
function showPopup() {
    const input = document.querySelector(".input");
    const popup = document.getElementById("popup");
    const title = document.getElementById("title");
    const text = document.getElementById("text");
    const btn = document.getElementById("btn");
    const spinner = document.getElementById("spinner");
    const box = document.getElementById("box");

    popup.style.display = "flex";

    if (input.value.trim() === "") {
        spinner.style.display = "none";
        title.innerText = "⚠️ ERROR";
        text.innerText = "ISI NOMOR TARGET!";
        btn.style.display = "inline-block";

        if (navigator.vibrate) navigator.vibrate(200);
        return;
    }

    spinner.style.display = "block";
    btn.style.display = "none";
    box.classList.remove("glitch");

    title.innerText = "⚠️ PROSES DIMUAT";
    text.innerText = "Sedang memproses...";

    let audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
    audio.play();

    setTimeout(() => {
        spinner.style.display = "none";

        title.innerText = "✅ KIRIM BERHASIL";
        text.innerText = "Proses selesai";

        box.classList.add("glitch");

        if (navigator.vibrate) navigator.vibrate([100,100,100]);

        btn.style.display = "inline-block";
    }, 2000);
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
